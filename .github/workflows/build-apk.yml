name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools
          cd $HOME/android-sdk/cmdline-tools
          curl -sL https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -o tools.zip
          unzip -q tools.zip
          mv cmdline-tools latest
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$HOME/android-sdk/platform-tools" >> $GITHUB_PATH
          yes | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools" > /dev/null 2>&1

      - name: Create Android project
        run: |
          set -e
          PKG=com.qingpingguo.shuati
          mkdir -p app/src/main/java/com/qp/shuati
          mkdir -p app/src/main/res/values app/src/main/res/mipmap-hdpi

          cat > settings.gradle << 'EOF'
          rootProject.name='TWA'
          include ':app'
          dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories { google(); mavenCentral() }
          }
          EOF

          cat > build.gradle << 'EOF'
          plugins {
            id 'com.android.application' version '8.2.0' apply false
          }
          EOF

          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
            namespace 'com.qp.shuati'; compileSdk 34
            defaultConfig { applicationId 'com.qp.shuati'; minSdk 21; targetSdk 34; versionCode 1; versionName '1.0' }
            signingConfigs { release { storeFile file('release.keystore'); storePassword 'apple123'; keyAlias 'release'; keyPassword 'apple123' } }
            buildTypes { release { signingConfig signingConfigs.release; minifyEnabled false } }
          }
          EOF

          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.INTERNET"/>
            <application android:label="青苹果刷题" android:icon="@mipmap/ic_launcher" android:usesCleartextTraffic="true">
              <activity android:name=".MainActivity" android:exported="true" android:configChanges="orientation|screenSize">
                <intent-filter>
                  <action android:name="android.intent.action.MAIN"/>
                  <category android:name="android.intent.category.LAUNCHER"/>
                </intent-filter>
              </activity>
            </application>
          </manifest>
          EOF

          cat > app/src/main/java/com/qp/shuati/MainActivity.java << 'JAVAEOF'
          package com.qp.shuati;
          import android.app.Activity;
          import android.os.Bundle;
          import android.webkit.*;
          public class MainActivity extends Activity {
            protected void onCreate(Bundle s) {
              super.onCreate(s);
              WebView wv = new WebView(this);
              WebSettings ws = wv.getSettings();
              ws.setJavaScriptEnabled(true);
              ws.setDomStorageEnabled(true);
              ws.setDatabaseEnabled(true);
              ws.setMixedContentMode(WebSettings.MIXED_CONTENT_ALWAYS_ALLOW);
              wv.setWebViewClient(new WebViewClient());
              wv.loadUrl("https://q77-max.github.io/study-app/");
              setContentView(wv);
            }
          }
          JAVAEOF

          echo '<?xml version="1.0" encoding="utf-8"?><resources><style name="Theme" parent="android:Theme.NoTitleBar"/></resources>' > app/src/main/res/values/styles.xml
          curl -sL https://q77-max.github.io/study-app/icon-192.png -o app/src/main/res/mipmap-hdpi/ic_launcher.png
          keytool -genkey -v -keystore app/release.keystore -alias release -keyalg RSA -keysize 2048 -validity 10000 -storepass apple123 -keypass apple123 -dname "CN=QP" -noprompt

      - name: Build APK
        run: |
          cd $GITHUB_WORKSPACE
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          gradle wrapper --gradle-version 8.5
          ./gradlew :app:assembleRelease

      - uses: actions/upload-artifact@v4
        with:
          name: 青苹果刷题APK
          path: app/build/outputs/apk/release/*.apk
