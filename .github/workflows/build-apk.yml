name: Build APK

on:
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    container:
      image: seanmorris/bubblewrap:latest
    steps:
      - name: Setup keystore
        run: |
          keytool -genkey -v -keystore release.keystore -alias release -keyalg RSA -keysize 2048 -validity 10000 -storepass apple123 -keypass apple123 -dname "CN=QP,OU=Q,O=Apple,L=BJ,ST=BJ,C=CN" -noprompt

      - name: Init TWA
        run: |
          bubblewrap init --manifest https://q77-max.github.io/study-app/manifest.json --directory . << ANSWERS
          n
          /usr/lib/jvm/java-17-openjdk-amd64
          ANSWERS

      - name: Update keystore config
        run: |
          bubblewrap update --manifest ./twa-manifest.json --keyAlias release --keyPassword apple123 --keyStore ./release.keystore --storePassword apple123

      - name: Build APK
        run: bubblewrap build

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: 青苹果刷题-APK
          path: ./*.apk
