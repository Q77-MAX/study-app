name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 21 }
      - uses: actions/setup-node@v4
        with: { node-version: 22 }

      - name: Build APK
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
        run: |
          npm install
          npm run build
          npx cap add android
          npx cap sync
          # Replace default Capacitor icon with 青苹果 icon
          curl -sL https://q77-max.github.io/study-app/icon-192.png -o android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          curl -sL https://q77-max.github.io/study-app/icon-192.png -o android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          curl -sL https://q77-max.github.io/study-app/icon-192.png -o android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          curl -sL https://q77-max.github.io/study-app/icon-192.png -o android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          curl -sL https://q77-max.github.io/study-app/icon-512.png -o android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          # Also set round icon
          for d in mipmap-hdpi mipmap-mdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi; do
            cp android/app/src/main/res/$d/ic_launcher.png android/app/src/main/res/$d/ic_launcher_round.png 2>/dev/null || true
          done
          # Generate keystore for release signing
          keytool -genkey -v -keystore android/app/release.keystore -alias release -keyalg RSA -keysize 2048 -validity 10000 -storepass apple123 -keypass apple123 -dname "CN=QP" -noprompt
          # Create keystore.properties for signing
          echo "storeFile=release.keystore" > android/keystore.properties
          echo "storePassword=apple123" >> android/keystore.properties
          echo "keyAlias=release" >> android/keystore.properties
          echo "keyPassword=apple123" >> android/keystore.properties
          # Configure signing in app build.gradle
          cat >> android/app/build.gradle << 'SIGNEOF'
          android {
            signingConfigs {
              release {
                storeFile file('release.keystore')
                storePassword 'apple123'
                keyAlias 'release'
                keyPassword 'apple123'
              }
            }
            buildTypes {
              release {
                signingConfig signingConfigs.release
              }
            }
          }
          SIGNEOF
          cd android && ./gradlew assembleRelease

      - uses: actions/upload-artifact@v4
        with:
          name: 青苹果刷题APK
          path: android/app/build/outputs/apk/release/*.apk
